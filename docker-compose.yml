services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "empoweredAcademy#g65890"
      POSTGRES_DB: postgres
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c effective_cache_size=512MB
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WORKERS: "4"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  pgdata:
